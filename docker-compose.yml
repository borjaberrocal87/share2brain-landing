services:
  landing:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: share2brain-landing
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - share2brain-network

networks:
  share2brain-network:
    driver: bridge
