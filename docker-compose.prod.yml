services:
  landing:
    image: ghcr.io/borjaberrocal87/share2brain-landing:latest
    container_name: share2brain-landing
    expose:
      - "80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - share2brain-network

  caddy:
    image: caddy:2-alpine
    container_name: share2brain-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - landing
    networks:
      - share2brain-network

networks:
  share2brain-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
