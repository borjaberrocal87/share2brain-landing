  <polygon points="600,180 660,210 660,270 600,300 540,270 540,210" fill="#0E1116"/>
  <polygon points="600,210 630,227 630,253 600,270 570,253 570,227" fill="#F5A623"/>
  
  <!-- Title -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#E6E9EF" text-anchor="middle">Hivly</text>
  
  <!-- Subtitle -->
